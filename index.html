  <style>
    * {

    body {

    @keyframes splashFade {

    }

    @keyframes fadeInLate {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 0.9; transform: translateY(0); }

<script>
  (function(){
    "use strict";

    // ---------- SPLASH SCREEN ----------
    const splash = document.getElementById('splashScreen');
    const mainContent = document.getElementById('mainContent');
    const text1 = document.getElementById('splashText1');
    const text2 = document.getElementById('splashText2');
    const text3 = document.getElementById('splashText3');

    let sequenceTimer;

    function startSplashSequence() {
      text1.style.display = 'block';
      text2.style.display = 'none';
      text3.style.display = 'none';

      sequenceTimer = setTimeout(() => {
        text1.style.display = 'none';
        text2.style.display = 'block';
        
        sequenceTimer = setTimeout(() => {
          text2.style.display = 'none';
          text3.style.display = 'block';
          
          sequenceTimer = setTimeout(() => {
            hideSplash();
          }, 900);
        }, 900);
      }, 900);
    }

    function hideSplash() {
      splash.style.opacity = '0';
      setTimeout(() => {
        splash.style.display = 'none';
        mainContent.classList.add('visible');
      }, 500);
      if (sequenceTimer) clearTimeout(sequenceTimer);
    }

    function skipSplashHandler(e) {
      if (splash.style.display !== 'none') {
        if (sequenceTimer) clearTimeout(sequenceTimer);
        hideSplash();
      }
    }

    window.addEventListener('keydown', skipSplashHandler);
    splash.addEventListener('click', skipSplashHandler);
    startSplashSequence();

    // ---------- FFMPEG WASM INIT ----------
    const { FFmpeg } = FFmpegWASM;
    const ffmpeg = new FFmpeg();
    
    let ffmpegLoaded = false;
    const loadFFmpeg = async () => {
      if (ffmpegLoaded) return true;
      try {
        setStatus('<div class="loader"><div class="spinner"></div><span>Loading FFmpeg (~25MB)...</span></div>');
        await ffmpeg.load({
          coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.4/dist/umd/ffmpeg-core.js',
        });
        ffmpegLoaded = true;
        setStatus('');
        return true;
      } catch (e) {
        console.warn('FFmpeg load failed:', e);
        setStatus('<div class="error-message">FFmpeg failed. Using direct download.</div>');
        return false;
      }
    };

    // ---------- API CONFIG ----------
    const API_URL = 'https://social-download-all-in-one.p.rapidapi.com/v1/social/autolink';
    const RAPIDAPI_KEY = 'f614ce5529msh2091e918b1bcc0ep1faf4ejsneddb5bf54e1c';
    const RAPIDAPI_HOST = 'social-download-all-in-one.p.rapidapi.com';

    const urlInput = document.getElementById('videoUrl');
    const fetchBtn = document.getElementById('fetchBtn');
    const pasteBtn = document.getElementById('pasteBtn');
    const statusArea = document.getElementById('statusArea');
    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const resultContainer = document.getElementById('resultContainer');
    const thumbImg = document.getElementById('thumbImg');
    const videoTitle = document.getElementById('videoTitle');
    const authorName = document.getElementById('authorName');
    const platformBadge = document.getElementById('platformBadge');
    const mediaListContainer = document.getElementById('mediaListContainer');

    let currentData = null;

    function formatBytes(b) { if(!b) return ''; return (b/1048576).toFixed(1)+' MB'; }
    function setStatus(html) { statusArea.innerHTML = html; }
    function showLoader() { setStatus('<div class="loader"><div class="spinner"></div><span>Fetching media info...</span></div>'); }
    function showError(msg) { setStatus(`<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${msg}</div>`); resultContainer.classList.add('hidden'); }
    function clearResults() { resultContainer.classList.add('hidden'); mediaListContainer.innerHTML = ''; progressContainer.classList.add('hidden'); }

    // Fetch file as Uint8Array
    async function fetchFile(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Failed to fetch: ${url}`);
      const buffer = await response.arrayBuffer();
      return new Uint8Array(buffer);
    }

    // Merge video + audio using FFmpeg
    async function mergeVideoAudio(videoUrl, audioUrl, quality, onProgress) {
      if (!ffmpegLoaded) {
        const loaded = await loadFFmpeg();
        if (!loaded) throw new Error('FFmpeg not available');
      }

      onProgress(10, 'Downloading video...');
      const videoData = await fetchFile(videoUrl);
      
      onProgress(30, 'Downloading audio...');
      const audioData = await fetchFile(audioUrl);
      
      onProgress(50, 'Merging with FFmpeg...');
      
      await ffmpeg.writeFile('input.mp4', videoData);
      await ffmpeg.writeFile('audio.mp3', audioData);
      
      // Merge command
      await ffmpeg.exec([
        '-i', 'input.mp4',
        '-i', 'audio.mp3',
        '-c:v', 'copy',
        '-c:a', 'aac',
        '-map', '0:v:0',
        '-map', '1:a:0',
        '-shortest',
        '-movflags', '+faststart',
        `output_${quality}.mp4`
      ]);
      
      onProgress(90, 'Finalizing...');
      const outputData = await ffmpeg.readFile(`output_${quality}.mp4`);
      
      // Cleanup
      await ffmpeg.deleteFile('input.mp4');
      await ffmpeg.deleteFile('audio.mp3');
      await ffmpeg.deleteFile(`output_${quality}.mp4`);
      
      return outputData;
    }

    // Download helper
    function downloadBlob(data, filename) {
      const blob = new Blob([data], { type: 'video/mp4' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    // Direct download (no merge)
    function directDownload(url, filename) {
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.target = '_blank';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => a.remove(), 150);
    }

    // Render media with merge capability
    function renderMedia(data) {
      const medias = data.medias || [];
      const audioItems = medias.filter(m => m.type === 'audio');
      const videoItems = medias.filter(m => m.type === 'video');
      
      thumbImg.src = data.thumbnail || 'https://placehold.co/400x400/0a1428/2ad4ff?text=NO+THUMB';
      videoTitle.textContent = data.title || 'Video';
      authorName.textContent = data.author ? `@${data.author}` : '@user';
      platformBadge.textContent = data.source || 'social';

      // Find best audio (prefer mp3)
      const bestAudio = audioItems.length > 0 ? audioItems[0] : null;
      const hasAudio = bestAudio !== null;

      let html = '';
      
      videoItems.forEach((video, idx) => {
        const quality = video.quality || 'video';
        const label = quality.replace(/_/g, ' ').replace('no watermark', 'No WM').replace('hd', 'HD');
        const sizeStr = formatBytes(video.data_size);
        const canMerge = hasAudio && ffmpegLoaded;
        
        html += `
          <div class="media-item" data-video-url="${video.url}" data-audio-url="${bestAudio?.url || ''}" data-quality="${quality}">
            <div class="media-info">
              <span class="quality-tag"><i class="fas fa-film"></i> ${label}</span>
              <span class="file-meta">${video.extension || 'MP4'} ${sizeStr}</span>
              ${hasAudio ? '<span class="audio-badge"><i class="fas fa-music"></i> +Audio ready</span>' : '<span class="audio-badge" style="background:#4a2a2a;border-color:#e74c3c;"><i class="fas fa-volume-mute"></i> No audio</span>'}
            </div>
            <div style="display:flex; gap:8px;">
              <button class="download-btn direct-btn" data-url="${video.url}" data-filename="jack_${label}.mp4">
                <i class="fas fa-download"></i> Direct
              </button>
              ${hasAudio ? `
                <button class="download-btn merge-btn" data-video="${video.url}" data-audio="${bestAudio.url}" data-quality="${label}">
                  <i class="fas fa-merge"></i> Merge+Audio
                </button>
              ` : ''}
            </div>
          </div>
        `;
      });

      // Also show audio-only download
      audioItems.forEach(audio => {
        html += `
          <div class="media-item">
            <div class="media-info">
              <span class="quality-tag" style="background:#3d1e6b;"><i class="fas fa-music"></i> Audio Only</span>
              <span>MP3 ${formatBytes(audio.data_size)}</span>
            </div>
            <button class="download-btn" data-url="${audio.url}" data-filename="jack_audio.mp3">
              <i class="fas fa-headphones"></i> Download
            </button>
          </div>
        `;
      });

      if (videoItems.length === 0 && audioItems.length === 0) {
        html = '<div class="media-item" style="justify-content:center;">✨ No media found</div>';
      }

      mediaListContainer.innerHTML = html;

      // Attach listeners
      document.querySelectorAll('.direct-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          directDownload(btn.dataset.url, btn.dataset.filename);
        });
      });

      document.querySelectorAll('.merge-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.preventDefault();
          const videoUrl = btn.dataset.video;
          const audioUrl = btn.dataset.audio;
          const quality = btn.dataset.quality;
          const filename = `jack_${quality}_with_audio.mp4`;
          
          btn.disabled = true;
          btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Merging...';
          progressContainer.classList.remove('hidden');
          
          try {
            const merged = await mergeVideoAudio(videoUrl, audioUrl, quality, (percent, text) => {
              progressFill.style.width = percent + '%';
              progressText.textContent = text;
            });
            
            progressFill.style.width = '100%';
            progressText.textContent = 'Complete!';
            
            downloadBlob(merged, filename);
            
            setTimeout(() => {
              progressContainer.classList.add('hidden');
              progressFill.style.width = '0%';
            }, 1500);
            
          } catch (err) {
            console.error('Merge failed:', err);
            showError('Merge failed. Trying direct download...');
            directDownload(videoUrl, filename.replace('_with_audio', '_direct'));
          } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-merge"></i> Merge+Audio';
          }
        });
      });

      // Audio download buttons
      document.querySelectorAll('.download-btn:not(.direct-btn):not(.merge-btn)').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const url = btn.dataset.url;
          const fname = btn.dataset.filename;
          if (url) directDownload(url, fname);
        });
      });

      resultContainer.classList.remove('hidden');
    }

    async function fetchMedia() {
      let url = urlInput.value.trim();
      if(!url) { showError('Enter a video URL'); return; }
      if(!url.startsWith('http')) { url = 'https://'+url; urlInput.value=url; }
      
      clearResults();
      showLoader();
      fetchBtn.disabled = true;

      try {
        const res = await fetch(API_URL, {
          method:'POST', 
          headers:{
            'Content-Type':'application/json',
            'x-rapidapi-host':RAPIDAPI_HOST,
            'x-rapidapi-key':RAPIDAPI_KEY
          },
          body: JSON.stringify({url})
        });
        
        if(!res.ok) throw new Error(`API ${res.status}`);
        const data = await res.json();
        if(data.error) throw new Error(data.message||'Unsupported');
        
        currentData = data;
        setStatus('');
        
        // Pre-load FFmpeg in background
        loadFFmpeg().catch(console.warn);
        
        renderMedia(data);
        
      } catch(e) {
        showError(e.message);
        clearResults();
      } finally {
        fetchBtn.disabled = false;
      }
    }

    fetchBtn.addEventListener('click', fetchMedia);
    
    pasteBtn.addEventListener('click', async () => {
      try { 
        const t = await navigator.clipboard.readText(); 
        if(t) urlInput.value = t; 
      } catch { 
        alert('Clipboard access needed'); 
      }
    });
    
    urlInput.addEventListener('keypress', e => { 
      if(e.key === 'Enter') fetchMedia(); 
    });

  })();
</script>
</body>
</html>
