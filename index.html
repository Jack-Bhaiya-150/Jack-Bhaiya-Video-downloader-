      });
    });
    
    videoUrlInput.addEventListener('keypress', (e) => {
      if(e.key === 'Enter') fetchVideo();
    });
    
    fetchBtn.addEventListener('click', fetchVideo);
    
    function fetchVideo() {
      const url = videoUrlInput.value.trim();
      if (!url) {
        showStatus('⚠️ URL paste koro!', '#ff003c');
        return;
      }
      
      if (!isValidUrl(url)) {
        showStatus('❌ Valid URL dao bhai!', '#ff003c');
        return;
      }
      
      fetchBtn.disabled = true;
      showStatus('<span class="loader"></span> Fetching...', '#00f7ff');
      resultContainer.innerHTML = '';
      
      fetchFromAPI(url);
    }
    
    function isValidUrl(string) {
      try { new URL(string); return true; } 
      catch { return false; }
    }
    
    function showStatus(msg, color) {
      statusDiv.innerHTML = msg;
      statusDiv.style.color = color;
    }
    
    function formatDuration(seconds) {
      if (!seconds) return '';
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }
    
    function formatFileSize(bytes) {
      if (!bytes) return '';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
    
    function getQualityLabel(quality) {
      const labels = {
        'hd_no_watermark': '🎬 HD (No Watermark)',
        'no_watermark': '📹 SD (No Watermark)',
        'watermark': '💧 With Watermark',
        'audio': '🎵 Audio MP3'
      };
      return labels[quality] || quality.toUpperCase();
    }
    
    async function fetchFromAPI(url) {
      try {
        const response = await fetch(`https://social-media-video-downloader.p.rapidapi.com/api/download?url=${encodeURIComponent(url)}`, {
          method: 'GET',
          headers: {
            'x-rapidapi-key': RAPIDAPI_KEY,
            'x-rapidapi-host': API_HOST
          }
        });
        
        if (!response.ok) {
          throw new Error(`HTTP Error: ${response.status}`);
        }
        
        const data = await response.json();
        console.log('API Response:', data);
        
        // নতুন স্ট্রাকচার চেক
        if (data && data.medias && Array.isArray(data.medias) && data.medias.length > 0) {
          displayResult(data, url);
          showStatus('✅ Ready to download!', '#39ff14');
        } else {
          throw new Error('No medias found in response');
        }
        
      } catch (error) {
        console.error('Fetch error:', error);
        showStatus(`❌ Error: ${error.message}`, '#ff003c');
        resultContainer.innerHTML = `
          <div class="error-note">
            <i class="fas fa-exclamation-triangle"></i> 
            API error ba invalid link. Example link try koro!<br>
            <small style="display:block; margin-top:10px; color:#aaa;">${error.message}</small>
          </div>
        `;
      } finally {
        fetchBtn.disabled = false;
      }
    }
    
    function displayResult(data, originalUrl) {
      const thumbnail = data.thumbnail || 'https://via.placeholder.com/75/1a1a2e/00f7ff?text=VIDEO';
      const title = data.title || 'Untitled';
      const author = data.author || data.uploader || 'Unknown';
      const duration = formatDuration(data.duration);
      
      // Separate video and audio
      const videoMedias = data.medias.filter(m => m.type === 'video' || !m.type);
      const audioMedias = data.medias.filter(m => m.type === 'audio');
      
      // Build HTML
      let html = `
        <div class="media-card">
          <div class="media-header">
            <img class="thumbnail" src="${thumbnail}" alt="thumb" onerror="this.src='https://via.placeholder.com/75/1a1a2e/00f7ff?text=VIDEO'">
            <div class="media-info">
              <h3>${escapeHtml(title.substring(0, 50))}${title.length > 50 ? '...' : ''}</h3>
              <div class="media-meta">
                <span><i class="fas fa-user"></i> ${escapeHtml(author.substring(0, 20))}</span>
                ${duration ? `<span><i class="fas fa-clock"></i> ${duration}</span>` : ''}
                <span><i class="fas fa-globe"></i> ${getPlatform(originalUrl)}</span>
              </div>
            </div>
          </div>
          <div class="download-grid">
      `;
      
      // Video options
      videoMedias.forEach((media, index) => {
        const qualityLabel = getQualityLabel(media.quality);
        const sizeText = media.data_size ? ` (${formatFileSize(media.data_size)})` : '';
        const ext = media.extension || 'mp4';
        
        html += `
          <div class="download-item">
            <div class="quality-badge">
              <i class="fas fa-video"></i>
              <span>${qualityLabel}${sizeText}</span>
            </div>
            <button class="download-btn" data-url="${escapeHtml(media.url)}" data-filename="jackbhaiya_${author.replace(/[^a-z0-9]/gi,'_')}_${index}.${ext}">
              <i class="fas fa-download"></i> DOWNLOAD
            </button>
          </div>
        `;
      });
      
      // Audio options
      audioMedias.forEach((media, index) => {
        const qualityLabel = getQualityLabel(media.quality);
        const sizeText = media.data_size ? ` (${formatFileSize(media.data_size)})` : '';
        const ext = media.extension || 'mp3';
        
        html += `
          <div class="download-item audio-item">
            <div class="quality-badge">
              <i class="fas fa-music"></i>
              <span>${qualityLabel}${sizeText}</span>
            </div>
            <button class="download-btn" data-url="${escapeHtml(media.url)}" data-filename="jackbhaiya_${author.replace(/[^a-z0-9]/gi,'_')}_audio_${index}.${ext}">
              <i class="fas fa-download"></i> DOWNLOAD
            </button>
          </div>
        `;
      });
      
      if (videoMedias.length === 0 && audioMedias.length === 0) {
        html += `<div class="error-note"><i class="fas fa-exclamation-circle"></i> No download links found</div>`;
      }
      
      html += `
          </div>
        </div>
      `;
      
      resultContainer.innerHTML = html;
      
      // Add download listeners
      document.querySelectorAll('.download-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const url = this.dataset.url;
          const filename = this.dataset.filename;
          downloadFile(url, filename);
        });
      });
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function getPlatform(url) {
      if (url.includes('tiktok')) return 'TikTok';
      if (url.includes('instagram')) return 'Instagram';
      if (url.includes('facebook')) return 'Facebook';
      if (url.includes('youtube') || url.includes('youtu.be')) return 'YouTube';
      return 'Social';
    }
    
    function downloadFile(url, filename) {
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.target = '_blank';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      
      showStatus(`⬇️ Download started: ${filename}`, '#39ff14');
      setTimeout(() => showStatus('✅ Ready for next!', '#00f7ff'), 3000);
    }
    
  })();
</script>
