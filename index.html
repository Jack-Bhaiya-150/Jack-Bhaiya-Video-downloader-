  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
      background: linear-gradient(145deg, #f3f6fd 0%, #e9eef9 100%);

      margin: 0;

    /* ---------- SPLASH NAME OVERLAY ---------- */
    .splash-name {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0b1b33;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 1;
      transition: opacity 0.6s ease-out, visibility 0.6s;
      visibility: visible;
      pointer-events: none;
    }

    .splash-name.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    .name-box {
      text-align: center;
      animation: softGlow 2s infinite alternate;
    }

    .name-box h2 {
      font-size: 3.2rem;
      font-weight: 800;
      color: white;
      text-shadow: 0 4px 20px rgba(0,160,255,0.7);
      letter-spacing: 2px;
      background: linear-gradient(135deg, #a7c0ff, #d9e6ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }

    .name-box p {
      color: #bdd3ff;
      font-size: 1.1rem;
      font-weight: 400;
    }

    @keyframes softGlow {
      0% { filter: drop-shadow(0 0 8px #3b82f6); }
      100% { filter: drop-shadow(0 0 20px #60a5fa); }
    }

    /* ---------- MAIN CARD ---------- */
    .app-card {
      max-width: 540px;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-radius: 36px;
      box-shadow: 0 25px 45px rgba(0, 10, 30, 0.12), 0 6px 14px rgba(0, 0, 0, 0.05);
      padding: 24px 20px 28px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      transition: all 0.2s;
    }

    h1 {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.9rem;
      color: #0b1b33;
      margin-bottom: 8px;
    }

    h1 i {
      color: #2563eb;
      background: #eef2ff;
      padding: 10px;

      font-size: 1.5rem;
      box-shadow: 0 4px 8px rgba(0,0,0,0.02);
    }

    .subhead {
      font-size: 0.95rem;

      margin-bottom: 22px;
      padding-left: 6px;
      border-left: 5px solid #3b82f6;
      padding-left: 14px;

    }

    .platform-badge {
      display: flex;
      flex-wrap: wrap;

      margin-bottom: 20px;
      justify-content: center;
    }

    .badge {

      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #1e293b;

      align-items: center;

    .badge i {

    }

    .input-group {
      display: flex;

      margin-bottom: 18px;
    }

    label {
      font-weight: 600;

      color: #1f2a41;

    .url-input-wrapper {

    .url-input-wrapper:focus-within {

    }

    .url-input-wrapper i {

      font-size: 1.2rem;
    }

    #videoUrl {
      flex: 1;

    #videoUrl::placeholder {

    }

    #fetchBtn {

    #fetchBtn i {
      font-size: 1rem;
    }

    #fetchBtn:active {
      transform: scale(0.97);
      background: #1e40af;
    }

    #fetchBtn:disabled {
      opacity: 0.6;
      pointer-events: none;
      box-shadow: none;
      background: #94a3b8;
      border-color: #94a3b8;
    }

    .example-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 14px;
      margin: 14px 0 18px;
      justify-content: space-evenly;
    }

    .example-btn {
      background: rgba(255,255,255,0.7);
      border: 1.5px dashed #b9c7da;
      padding: 8px 14px;
      border-radius: 40px;
      font-size: 0.85rem;

    #statusMessage {
      min-height: 40px;

      color: #334155;

    .loader {
      display: inline-block;
      width: 20px;

      border: 3px solid #cbd5e1;
      border-top: 3px solid #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .preview-section {
      margin-top: 8px;
    }

    .media-card {
      background: #ffffffd9;
      backdrop-filter: blur(4px);
      border-radius: 28px;
      padding: 18px 16px;
      border: 1px solid #e6edf8;

    .media-header {
      display: flex;

      margin-bottom: 16px;
    }

    .thumbnail {
      width: 70px;
      height: 70px;
      border-radius: 20px;

      background: #d9e2ef;
      border: 2.5px solid white;

    .media-info h3 {

    .media-meta {
      display: flex;

      font-size: 0.8rem;
      color: #4f617c;
    }

    .download-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .download-item {
      background: white;
      border-radius: 60px;
      padding: 8px 12px 8px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1.5px solid #e0e9f5;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .quality-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      color: #0f2b4f;
    }

    .quality-badge i {
      width: 24px;
      color: #2563eb;
      font-size: 1.2rem;
    }

    .download-btn {
      background: #ffffff;
      border: 2px solid #1e3a8a;
      color: #1e3a8a;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .download-btn i {
      font-size: 1rem;
    }

    .download-btn:active {
      background: #1e3a8a;
      color: white;
    }

    .audio-download {
      background: #eef4ff;

    .error-note {
      background: #fee2e2;
      color: #991b1b;
      padding: 14px 18px;
      border-radius: 28px;
      font-size: 0.95rem;
      margin: 15px 0 5px;
      border-left: 6px solid #ef4444;
    }

    .quota-warning {
      background: #fef3c7;
      color: #92400e;
      padding: 14px 18px;
      border-radius: 28px;
      font-size: 0.9rem;
      margin: 15px 0 5px;

    .footer-note {
      margin-top: 24px;

      font-size: 0.75rem;
      color: #6f7e95;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .jack-tag {
      background: #1e3a8a10;

      padding: 4px 14px;
      color: #1e3a8a;
      font-weight: 600;
    }

    .demo-note {
      background: #e0e7ff;
      border-radius: 20px;
      padding: 12px 16px;
      margin: 16px 0 8px;
      font-size: 0.85rem;
      color: #1e3a8a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
  </style>
</head>

<script>
  (function(){
    "use strict";

    // ---------- SPLASH TIMER ----------
    const splash = document.getElementById('splashScreen');
    setTimeout(() => {
      splash.classList.add('fade-out');
    }, 2500);

    // ---------- API CONFIG ----------
    const RAPIDAPI_KEY = '29f8c3b79amshc7b9755d426320dp1b94fajsn62b1821d47db';
    const API_HOST = 'social-download-all-in-one.p.rapidapi.com';
    const API_URL = 'https://social-download-all-in-one.p.rapidapi.com/v1/social/autolink';

    const urlInput = document.getElementById('videoUrl');
    const fetchBtn = document.getElementById('fetchBtn');
    const statusDiv = document.getElementById('statusMessage');
    const resultContainer = document.getElementById('resultContainer');
    const demoNote = document.getElementById('demoModeNote');

    // ---------- কোটার জন্য ফলব্যাক ডেমো ----------
    function showQuotaFallback(message = '') {
      demoNote.style.display = 'flex';
      
      // ডেমো ডাউনলোড অপশন (সরাসরি কাজ করবে না, কিন্তু UI বুঝানোর জন্য)
      const demoHtml = `
        <div class="media-card">
          <div class="media-header">
            <div class="thumbnail" style="display:flex;align-items:center;justify-content:center;background:#1e3a8a20;"><i class="fas fa-video" style="color:#1e3a8a; font-size:28px;"></i></div>
            <div class="media-info">
              <h3>ডেমো ভিডিও (API কোটা শেষ)</h3>
              <div class="media-meta">
                <span><i class="far fa-user"></i> @jackbhaiya</span>
                <span><i class="fab fa-tiktok"></i> TikTok</span>
              </div>
            </div>
          </div>
          <div class="download-grid">
            <div class="download-item">
              <div class="quality-badge"><i class="fas fa-video"></i><span>🎥 HD (ডেমো)</span></div>
              <button class="download-btn" onclick="alert('API কোটা শেষ। নতুন API কী নিন RapidAPI থেকে।')"><i class="fas fa-download"></i> ডেমো</button>
            </div>
            <div class="download-item audio-download">
              <div class="quality-badge"><i class="fas fa-music"></i><span>🎵 Audio MP3 (ডেমো)</span></div>
              <button class="download-btn" onclick="alert('API কোটা শেষ, প্ল্যান আপগ্রেড করুন।')"><i class="fas fa-download"></i> MP3</button>
            </div>
          </div>
        </div>
        <div class="quota-warning">
          <i class="fas fa-exclamation-circle"></i> 
          ${message || 'Monthly quota exceeded. Upgrade your RapidAPI plan.'}
          <br><small>জ্যাক ভাইয়া: নতুন API key নিলে কাজ করবে।</small>
        </div>
      `;
      resultContainer.innerHTML = demoHtml;
    }

    function setStatus(html, isError = false) {
      statusDiv.innerHTML = html;
      statusDiv.style.color = isError ? '#b91c1c' : '#334155';
    }

    function clearStatus() {
      setStatus('');
    }

    function showLoader(message = 'Fetching media...') {
      setStatus(`<span class="loader"></span> <span>${message}</span>`);
    }

    function formatBytes(bytes) {
      if (!bytes) return '';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function formatDuration(ms) {
      if (!ms) return '';
      const sec = Math.floor(ms / 1000);
      const min = Math.floor(sec / 60);
      const remainSec = sec % 60;
      return `${min}:${remainSec.toString().padStart(2, '0')}`;
    }

    function downloadMedia(url, filename) {
      if (!url) return;
      const a = document.createElement('a');
      a.href = url;
      a.download = filename || 'jack_bhaiya_media';
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => document.body.removeChild(a), 150);
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderResult(data) {
      demoNote.style.display = 'none'; // hide demo note if success
      if (!data || data.error) {
        resultContainer.innerHTML = `<div class="error-note"><i class="fas fa-exclamation-triangle"></i> ${data?.message || 'মিডিয়া পাওয়া যায়নি'}</div>`;
        return;
      }

      const source = data.source || 'social';
      const title = data.title || 'Jack Bhaiya Video';
      const thumbnail = data.thumbnail || '';
      const author = data.author || data.unique_id || '';
      const duration = data.duration;
      const medias = data.medias || [];
      
      const videoItems = medias.filter(m => m.type === 'video' || (!m.type && m.url));
      const audioItems = medias.filter(m => m.type === 'audio');

      const getQualityLabel = (item) => {
        if (item.quality === 'no_watermark') return '🎥 No Watermark';
        if (item.quality === 'hd_no_watermark') return '📱 HD (no watermark)';
        if (item.quality === 'watermark') return '💧 Watermark';
        if (item.extension) return `${item.extension.toUpperCase()} · ${item.quality || 'video'}`;
        return 'Video';
      };

      let html = `
        <div class="media-card">
          <div class="media-header">
            ${thumbnail ? `<img class="thumbnail" src="${thumbnail}" alt="thumb" onerror="this.style.display='none'">` : '<div class="thumbnail" style="display:flex;align-items:center;justify-content:center;background:#eef2ff"><i class="fas fa-film" style="color:#3b82f6"></i></div>'}
            <div class="media-info">
              <h3>${escapeHtml(title)}</h3>
              <div class="media-meta">
                ${author ? `<span><i class="far fa-user"></i> @${escapeHtml(author)}</span>` : ''}
                <span><i class="fab fa-${escapeHtml(source)}"></i> ${escapeHtml(source)}</span>
                ${duration ? `<span><i class="far fa-clock"></i> ${formatDuration(duration)}</span>` : ''}
              </div>
            </div>
          </div>
      `;

      if (videoItems.length === 0 && audioItems.length === 0) {
        html += `<div style="padding:12px; background:#f1f5f9; border-radius:24px; text-align:center;"><i class="far fa-frown"></i> কোনো ডাউনলোড লিংক নেই</div>`;
      } else {
        html += `<div class="download-grid">`;
        const sortedVideos = [...videoItems].sort((a, b) => {
          const score = (q) => q === 'no_watermark' ? 3 : q === 'hd_no_watermark' ? 2 : q === 'watermark' ? 1 : 0;
          return score(b.quality) - score(a.quality);
        });

        sortedVideos.forEach((item) => {
          const sizeStr = item.data_size ? formatBytes(item.data_size) : '';
          const qualityText = getQualityLabel(item);
          const ext = item.extension || 'mp4';
          const filename = `${title.replace(/[^a-z0-9]/gi,'_').substring(0,25) || 'video'}_${qualityText.replace(/[^a-z0-9]/gi,'')}.${ext}`;
          html += `
            <div class="download-item">
              <div class="quality-badge"><i class="fas fa-video"></i><span>${escapeHtml(qualityText)} ${sizeStr ? '· '+sizeStr : ''}</span></div>
              <button class="download-btn" data-url="${encodeURI(item.url)}" data-filename="${filename}"><i class="fas fa-download"></i> Save</button>
            </div>
          `;
        });

        audioItems.forEach((item) => {
          const sizeStr = item.data_size ? formatBytes(item.data_size) : '';
          const ext = item.extension || 'mp3';
          const filename = `${title.replace(/[^a-z0-9]/gi,'_').substring(0,20) || 'audio'}_audio.${ext}`;
          html += `
            <div class="download-item audio-download">
              <div class="quality-badge"><i class="fas fa-music"></i><span>🎵 Audio ${ext.toUpperCase()} ${sizeStr ? '· '+sizeStr : ''}</span></div>
              <button class="download-btn" data-url="${encodeURI(item.url)}" data-filename="${filename}"><i class="fas fa-download"></i> MP3</button>
            </div>
          `;
        });
        html += `</div>`;
      }
      
      if (data.time_end) {
        html += `<div style="margin-top:12px; font-size:0.75rem; color:#5f7390; text-align:right;"><i class="far fa-hourglass"></i> ${data.time_end}ms</div>`;
      }
      html += `</div>`;
      resultContainer.innerHTML = html;

      document.querySelectorAll('.download-btn[data-url]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          downloadMedia(decodeURIComponent(btn.dataset.url), btn.dataset.filename);
        });
      });
    }

    async function fetchMedia(videoUrl) {
      if (!videoUrl || !videoUrl.trim()) {
        setStatus('⛔ লিংক দিন', true);
        return;
      }
      if (!videoUrl.startsWith('http')) {
        setStatus('❌ সঠিক URL নয়', true);
        return;
      }

      resultContainer.innerHTML = '';
      demoNote.style.display = 'none';
      showLoader('Jack Bhaiya fetching...');
      fetchBtn.disabled = true;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-rapidapi-host': API_HOST,
            'x-rapidapi-key': RAPIDAPI_KEY
          },
          body: JSON.stringify({ url: videoUrl })
        });

        // যদি HTTP 429 (quota exceeded) অথবা 403 etc
        if (response.status === 429) {
          throw new Error('QUOTA_EXCEEDED');
        }

        if (!response.ok) {
          let errDetail = `HTTP ${response.status}`;
          try { const e = await response.json(); errDetail = e.message || JSON.stringify(e); } catch (_) {}
          throw new Error(`API error: ${errDetail}`);
        }

        const data = await response.json();
        if (data && data.error === false) {
          clearStatus();
          renderResult(data);
        } else {
          // কিছু API error false না হলে
          const msg = data?.message || 'ডাউনলোড সম্ভব নয়';
          if (msg.toLowerCase().includes('quota') || msg.includes('exceeded')) {
            showQuotaFallback(msg);
            setStatus('⚠️ কোটা শেষ, ডেমো দেখানো হয়েছে', true);
          } else {
            setStatus(`⚠️ ${msg}`, true);
            resultContainer.innerHTML = `<div class="error-note"><i class="fas fa-info-circle"></i> ${escapeHtml(msg)}</div>`;
          }
        }
      } catch (err) {
        console.error(err);
        const errMsg = err.message || '';
        if (errMsg.includes('QUOTA_EXCEEDED') || errMsg.includes('429') || errMsg.toLowerCase().includes('quota')) {
          showQuotaFallback('Monthly quota exceeded.');
          setStatus('🚫 API কোটা শেষ। ডেমো মোড active', true);
        } else {
          setStatus(`🚫 ${errMsg}`, true);
          // যদি নেটওয়ার্ক বা অন্য সমস্যা
          if (!resultContainer.innerHTML) {
            resultContainer.innerHTML = `<div class="error-note"><i class="fas fa-plug"></i> নেটওয়ার্ক সমস্যা। আবার চেষ্টা করুন।</div>`;
          }
        }
      } finally {
        fetchBtn.disabled = false;
      }
    }

    fetchBtn.addEventListener('click', (e) => {
      e.preventDefault();
      fetchMedia(urlInput.value.trim());
    });

    urlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        fetchBtn.click();
      }
    });

    document.querySelectorAll('.example-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const demo = btn.getAttribute('data-url');
        if (demo) {
          urlInput.value = demo;
          fetchMedia(demo);
        }
      });
    });

    window.addEventListener('load', () => {
      if (!urlInput.value) {
        urlInput.value = 'https://www.tiktok.com/@yeuphimzz/video/7237370304337628442';
      }
    });

  })();
</script>
</body>
</html>
