    const fetchBtn = document.getElementById('fetchBtn');
    const statusDiv = document.getElementById('statusMessage');
    const resultContainer = document.getElementById('resultContainer');

    function setStatus(html, isError = false) {
      statusDiv.innerHTML = html;
      statusDiv.style.color = isError ? '#ff003c' : '#00f7ff';
    }

    function clearStatus() { setStatus(''); }
    function showLoader(message = 'SCANNING...') {
      setStatus(`<span class="loader"></span> <span>${message}</span>`);
    }

    function formatBytes(bytes) {
      if (!bytes) return '';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function formatDuration(ms) {
      if (!ms) return '';
      const sec = Math.floor(ms / 1000);
      const min = Math.floor(sec / 60);
      const remainSec = sec % 60;
      return `${min}:${remainSec.toString().padStart(2, '0')}`;
    }

    function downloadMedia(url, filename) {
      if (!url) return;
      const a = document.createElement('a');
      a.href = url;
      a.download = filename || 'neon_media';
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => document.body.removeChild(a), 150);
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderResult(data) {
      if (!data || data.error) {
        resultContainer.innerHTML = `<div class="error-note"><i class="fas fa-exclamation-triangle"></i> ${data?.message || 'SIGNAL LOST'}</div>`;
        return;
      }

      const source = data.source || 'NEON';
      const title = data.title || 'CYBERPUNK_VIDEO';
      const thumbnail = data.thumbnail || '';
      const author = data.author || data.unique_id || '';
      const duration = data.duration;
      const medias = data.medias || [];
      
      const videoItems = medias.filter(m => m.type === 'video' || (!m.type && m.url));
      const audioItems = medias.filter(m => m.type === 'audio');

      const getQualityLabel = (item) => {
        if (item.quality === 'no_watermark') return '🎥 NO_WATERMARK';
        if (item.quality === 'hd_no_watermark') return '📱 HD_CLEAN';
        if (item.quality === 'watermark') return '💧 WATERMARK';
        if (item.extension) return `${item.extension.toUpperCase()} · ${item.quality || 'VIDEO'}`;
        return 'VIDEO';
      };

      let html = `
        <div class="media-card">
          <div class="media-header">
            ${thumbnail ? `<img class="thumbnail" src="${thumbnail}" alt="thumb" onerror="this.style.display='none'">` : '<div class="thumbnail" style="display:flex;align-items:center;justify-content:center;background:#1a0033"><i class="fas fa-film" style="color:#a100ff"></i></div>'}
            <div class="media-info">
              <h3>${escapeHtml(title)}</h3>
              <div class="media-meta">
                ${author ? `<span><i class="far fa-user"></i> @${escapeHtml(author)}</span>` : ''}
                <span><i class="fab fa-${escapeHtml(source)}"></i> ${escapeHtml(source)}</span>
                ${duration ? `<span><i class="far fa-clock"></i> ${formatDuration(duration)}</span>` : ''}
              </div>
            </div>
          </div>
      `;

      if (videoItems.length === 0 && audioItems.length === 0) {
        html += `<div style="padding:16px; background:rgba(0,0,0,0.4); border-radius:20px; text-align:center; border:1px solid #ff003c;"><i class="far fa-frown"></i> NO STREAMS FOUND</div>`;
      } else {
        html += `<div class="download-grid">`;
        const sortedVideos = [...videoItems].sort((a, b) => {
          const score = (q) => q === 'no_watermark' ? 3 : q === 'hd_no_watermark' ? 2 : q === 'watermark' ? 1 : 0;
          return score(b.quality) - score(a.quality);
        });

        sortedVideos.forEach((item) => {
          const sizeStr = item.data_size ? formatBytes(item.data_size) : '';
          const qualityText = getQualityLabel(item);
          const ext = item.extension || 'mp4';
          const filename = `${title.replace(/[^a-z0-9]/gi,'_').substring(0,25) || 'video'}_${qualityText.replace(/[^a-z0-9]/gi,'')}.${ext}`;
          html += `
            <div class="download-item">
              <div class="quality-badge"><i class="fas fa-video"></i><span>${escapeHtml(qualityText)} ${sizeStr ? '· '+sizeStr : ''}</span></div>
              <button class="download-btn" data-url="${encodeURI(item.url)}" data-filename="${filename}"><i class="fas fa-download"></i> SAVE</button>
            </div>
          `;
        });

        audioItems.forEach((item) => {
          const sizeStr = item.data_size ? formatBytes(item.data_size) : '';
          const ext = item.extension || 'mp3';
          const filename = `${title.replace(/[^a-z0-9]/gi,'_').substring(0,20) || 'audio'}_audio.${ext}`;
          html += `
            <div class="download-item audio-download">
              <div class="quality-badge"><i class="fas fa-music"></i><span>🎵 AUDIO ${ext.toUpperCase()} ${sizeStr ? '· '+sizeStr : ''}</span></div>
              <button class="download-btn" data-url="${encodeURI(item.url)}" data-filename="${filename}"><i class="fas fa-download"></i> MP3</button>
            </div>
          `;
        });
        html += `</div>`;
      }
      
      if (data.time_end) {
        html += `<div style="margin-top:12px; font-size:0.75rem; color:#39ff14; text-align:right;"><i class="far fa-hourglass"></i> ${data.time_end}ms</div>`;
      }
      html += `</div>`;
      resultContainer.innerHTML = html;

      document.querySelectorAll('.download-btn[data-url]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          downloadMedia(decodeURIComponent(btn.dataset.url), btn.dataset.filename);
        });
      });
    }

    async function fetchMedia(videoUrl) {
      if (!videoUrl || !videoUrl.trim()) {
        setStatus('[ERROR] NO INPUT', true);
        return;
      }
      if (!videoUrl.startsWith('http')) {
        setStatus('[ERROR] INVALID URL', true);
        return;
      }

      resultContainer.innerHTML = '';
      showLoader('CONNECTING TO NEON NETWORK...');
      fetchBtn.disabled = true;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-rapidapi-host': API_HOST,
            'x-rapidapi-key': RAPIDAPI_KEY
          },
          body: JSON.stringify({ url: videoUrl })
        });

        if (!response.ok) {
          let errDetail = `HTTP ${response.status}`;
          try { const e = await response.json(); errDetail = e.message || JSON.stringify(e); } catch (_) {}
          throw new Error(`API: ${errDetail}`);
        }

        const data = await response.json();
        if (data && data.error === false) {
          clearStatus();
          renderResult(data);
          setStatus('[SUCCESS] STREAM READY <i class="fas fa-check-circle" style="color:#39ff14;"></i>', false);
        } else {
          const msg = data?.message || 'DECRYPTION FAILED';
          setStatus(`[WARN] ${msg}`, true);
          resultContainer.innerHTML = `<div class="error-note"><i class="fas fa-skull"></i> ${escapeHtml(msg)}</div>`;
        }
      } catch (err) {
        console.error(err);
        setStatus(`[FATAL] ${err.message}`, true);
        resultContainer.innerHTML = `<div class="error-note"><i class="fas fa-plug"></i> CONNECTION LOST<br><small>${escapeHtml(err.message)}</small></div>`;
      } finally {
        fetchBtn.disabled = false;
      }
    }

    fetchBtn.addEventListener('click', (e) => {
      e.preventDefault();
      fetchMedia(urlInput.value.trim());
    });

    urlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        fetchBtn.click();
      }
    });

    document.querySelectorAll('.example-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const demo = btn.getAttribute('data-url');
        if (demo) {
          urlInput.value = demo;
          fetchMedia(demo);
        }
      });
    });

    window.addEventListener('load', () => {
      if (!urlInput.value) {
        urlInput.value = 'https://www.tiktok.com/@jack_bhaiya/video/7237370304337628442';
      }
    });

  })();
</script>
</body>
</html>
