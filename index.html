<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>📥 All‑in‑One Downloader · RapidAPI</title>
  <!-- Font Awesome for crisp icons (mobile friendly) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f5f7fc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      margin: 0;
    }

    .app-card {
      max-width: 540px;
      width: 100%;
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0, 10, 30, 0.08), 0 6px 12px rgba(0, 0, 0, 0.05);
      padding: 24px 20px 28px;
      transition: all 0.2s;
      border: 1px solid rgba(211, 222, 245, 0.4);
    }

    h1 {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 650;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      color: #0b1b33;
      margin-bottom: 8px;
    }

    h1 i {
      color: #2563eb;
      background: #eef2ff;
      padding: 10px;
      border-radius: 18px;
      font-size: 1.5rem;
    }

    .subhead {
      font-size: 0.9rem;
      color: #5b687c;
      margin-bottom: 24px;
      padding-left: 6px;
      border-left: 4px solid #94a3b8;
      padding-left: 14px;
    }

    .platform-badge {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-bottom: 20px;
      justify-content: center;
    }

    .badge {
      background: #f1f5f9;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #1e293b;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.8);
    }

    .badge i {
      font-size: 1rem;
      color: #3b82f6;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }

    label {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 6px;
      color: #1f2a41;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .url-input-wrapper {
      display: flex;
      align-items: center;
      background: #f8fafd;
      border-radius: 60px;
      border: 1.5px solid #dde3ed;
      transition: border 0.15s, box-shadow 0.15s;
      padding: 4px 4px 4px 18px;
    }

    .url-input-wrapper:focus-within {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
      background: #ffffff;
    }

    .url-input-wrapper i {
      color: #7c8ba0;
      font-size: 1.1rem;
    }

    #videoUrl {
      flex: 1;
      border: none;
      background: transparent;
      padding: 14px 8px 14px 12px;
      font-size: 1rem;
      outline: none;
      color: #0f1825;
      font-family: inherit;
      min-width: 0;
    }

    #videoUrl::placeholder {
      color: #9aabbf;
      font-weight: 400;
      font-size: 0.9rem;
    }

    #fetchBtn {
      background: #2563eb;
      border: none;
      color: white;
      font-weight: 600;
      padding: 12px 22px;
      border-radius: 50px;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
      border: 1px solid #3b82f6;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    #fetchBtn i {
      font-size: 1rem;
    }

    #fetchBtn:active {
      transform: scale(0.97);
      background: #1d4ed8;
    }

    #fetchBtn:disabled {
      opacity: 0.6;
      pointer-events: none;
      box-shadow: none;
      background: #94a3b8;
      border-color: #94a3b8;
    }

    .example-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 16px;
      margin: 12px 0 18px;
      justify-content: space-evenly;
    }

    .example-btn {
      background: none;
      border: 1px dashed #b9c7da;
      padding: 8px 12px;
      border-radius: 40px;
      font-size: 0.8rem;
      color: #2563eb;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: background 0.15s;
      backdrop-filter: blur(4px);
    }

    .example-btn i {
      font-size: 0.9rem;
    }

    .example-btn:active {
      background: #e2e8f0;
    }

    /* status & loader */
    #statusMessage {
      min-height: 38px;
      margin: 10px 0 6px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #334155;
    }

    .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid #cbd5e1;
      border-top: 2.5px solid #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .preview-section {
      margin-top: 10px;
    }

    .media-card {
      background: #fafcff;
      border-radius: 24px;
      padding: 16px 14px;
      border: 1px solid #e6edf8;
      margin-bottom: 20px;
    }

    .media-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .thumbnail {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      object-fit: cover;
      background: #d9e2ef;
      border: 2px solid white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.02);
    }

    .media-info h3 {
      font-size: 1rem;
      font-weight: 700;
      color: #0b1b33;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .media-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      margin-top: 6px;
      font-size: 0.75rem;
      color: #5f6c84;
    }

    .download-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }

    .download-item {
      background: white;
      border-radius: 60px;
      padding: 8px 10px 8px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #e2eaf5;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }

    .quality-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: #0f2b4f;
    }

    .quality-badge i {
      width: 22px;
      color: #2563eb;
      font-size: 1.1rem;
    }

    .download-btn {
      background: #ffffff;
      border: 1.5px solid #2563eb;
      color: #2563eb;
      padding: 8px 22px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }

    .download-btn i {
      font-size: 0.9rem;
    }

    .download-btn:active {
      background: #2563eb;
      color: white;
    }

    .audio-download {
      background: #f1f5fe;
      border-color: #3b82f6;
    }

    .error-note {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px 16px;
      border-radius: 24px;
      font-size: 0.9rem;
      margin: 15px 0 5px;
      border-left: 6px solid #ef4444;
    }

    .footer-note {
      margin-top: 24px;
      text-align: center;
      font-size: 0.7rem;
      color: #7f8fa3;
    }
  </style>
</head>
<body>
<div class="app-card">
  <h1>
    <i class="fas fa-cloud-download-alt"></i> 
    All‑in‑One
  </h1>
  <div class="subhead">
    <i class="fas fa-bolt" style="margin-right: 6px;"></i> TikTok · Instagram · YouTube · more
  </div>

  <!-- platform hints -->
  <div class="platform-badge">
    <span class="badge"><i class="fab fa-tiktok"></i> TikTok</span>
    <span class="badge"><i class="fab fa-instagram"></i> Instagram</span>
    <span class="badge"><i class="fab fa-youtube"></i> YouTube</span>
    <span class="badge"><i class="fab fa-facebook"></i> FB</span>
    <span class="badge"><i class="fab fa-x-twitter"></i> X</span>
  </div>

  <!-- URL input -->
  <div class="input-group">
    <label><i class="fas fa-link"></i> Paste video link</label>
    <div class="url-input-wrapper">
      <i class="fas fa-paste"></i>
      <input type="text" id="videoUrl" placeholder="https://www.tiktok.com/@user/video/..." enterkeyhint="go" inputmode="url">
      <button id="fetchBtn"><i class="fas fa-search"></i> Fetch</button>
    </div>
  </div>

  <!-- Example quick links (mobile tap friendly) -->
  <div class="example-links">
    <span class="example-btn" data-url="https://www.tiktok.com/@yeuphimzz/video/7237370304337628442"><i class="fab fa-tiktok"></i> TikTok demo</span>
    <span class="example-btn" data-url="https://www.instagram.com/reel/C7zH6ZRNH4B/"><i class="fab fa-instagram"></i> IG reel</span>
    <span class="example-btn" data-url="https://youtube.com/shorts/5NvRkT6KqYw"><i class="fab fa-youtube"></i> Short</span>
  </div>

  <!-- Status / loader area -->
  <div id="statusMessage"></div>

  <!-- Results will be injected here -->
  <div id="resultContainer" class="preview-section"></div>

  <div class="footer-note">
    <i class="far fa-shield"></i> RapidAPI · Social Download All in One
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- CONFIG ----------
    const RAPIDAPI_KEY = '29f8c3b79amshc7b9755d426320dp1b94fajsn62b1821d47db';
    const API_HOST = 'social-download-all-in-one.p.rapidapi.com';
    const API_URL = 'https://social-download-all-in-one.p.rapidapi.com/v1/social/autolink';

    // DOM elements
    const urlInput = document.getElementById('videoUrl');
    const fetchBtn = document.getElementById('fetchBtn');
    const statusDiv = document.getElementById('statusMessage');
    const resultContainer = document.getElementById('resultContainer');

    // Helper: set loading / status
    function setStatus(html, isError = false) {
      statusDiv.innerHTML = html;
      if (isError) {
        statusDiv.style.color = '#b91c1c';
      } else {
        statusDiv.style.color = '#334155';
      }
    }

    function clearStatus() {
      setStatus('');
    }

    function showLoader(message = 'Fetching media...') {
      setStatus(`<span class="loader"></span> <span>${message}</span>`);
    }

    // Format bytes / duration
    function formatBytes(bytes) {
      if (!bytes || bytes === 0) return 'unknown size';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function formatDuration(ms) {
      if (!ms) return '';
      const sec = Math.floor(ms / 1000);
      const min = Math.floor(sec / 60);
      const remainSec = sec % 60;
      return `${min}:${remainSec.toString().padStart(2, '0')}`;
    }

    // Clean and prepare download
    function downloadMedia(url, filename) {
      if (!url) return;
      // Using anchor with download attribute (works if CORS allows, else opens in new tab)
      const a = document.createElement('a');
      a.href = url;
      a.download = filename || 'media_download';
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => document.body.removeChild(a), 150);
    }

    // Render result from API response
    function renderResult(data) {
      if (!data || data.error) {
        let errMsg = data?.message || 'Unknown error from API';
        resultContainer.innerHTML = `<div class="error-note"><i class="fas fa-exclamation-triangle"></i> ${errMsg}</div>`;
        return;
      }

      // data fields expected from Social Download All In One
      const source = data.source || 'social';
      const title = data.title || 'No title';
      const thumbnail = data.thumbnail || '';
      const author = data.author || data.unique_id || '';
      const duration = data.duration; // ms
      const medias = data.medias || [];
      
      // Filter video/audio types
      const videoItems = medias.filter(m => m.type === 'video' || (!m.type && m.url));
      const audioItems = medias.filter(m => m.type === 'audio');
      
      // Additional qualities, we prioritize no_watermark > hd_no_watermark > watermark > fallback
      const getQualityLabel = (item) => {
        if (item.quality === 'no_watermark') return '🎥 No Watermark';
        if (item.quality === 'hd_no_watermark') return '📱 HD (no watermark)';
        if (item.quality === 'watermark') return '💧 Watermark';
        if (item.extension) return `${item.extension.toUpperCase()} · ${item.quality || 'video'}`;
        return 'Video';
      };

      // Build media card
      let html = `
        <div class="media-card">
          <div class="media-header">
            ${thumbnail ? `<img class="thumbnail" src="${thumbnail}" alt="thumb" onerror="this.style.display='none'">` : '<div class="thumbnail" style="display:flex;align-items:center;justify-content:center;background:#eef2ff"><i class="fas fa-film" style="color:#3b82f6"></i></div>'}
            <div class="media-info">
              <h3>${escapeHtml(title) || 'Video content'}</h3>
              <div class="media-meta">
                ${author ? `<span><i class="far fa-user"></i> @${escapeHtml(author)}</span>` : ''}
                <span><i class="fab fa-${escapeHtml(source)}"></i> ${escapeHtml(source)}</span>
                ${duration ? `<span><i class="far fa-clock"></i> ${formatDuration(duration)}</span>` : ''}
              </div>
            </div>
          </div>
      `;

      if (videoItems.length === 0 && audioItems.length === 0) {
        html += `<div style="padding:10px; background:#f1f5f9; border-radius:20px; text-align:center; color:#475569;"><i class="far fa-frown"></i> No downloadable media found. Try another link.</div>`;
      } else {
        html += `<div class="download-grid">`;
        
        // Video options (prefer no watermark first)
        const sortedVideos = [...videoItems].sort((a, b) => {
          const score = (q) => q === 'no_watermark' ? 3 : q === 'hd_no_watermark' ? 2 : q === 'watermark' ? 1 : 0;
          return score(b.quality) - score(a.quality);
        });

        sortedVideos.forEach((item, idx) => {
          const sizeStr = item.data_size ? formatBytes(item.data_size) : '';
          const qualityText = getQualityLabel(item);
          const fileHint = item.extension ? `.${item.extension}` : '.mp4';
          const filename = `${title.replace(/[^a-z0-9]/gi,'_').substring(0,30) || 'video'}_${qualityText.replace(/[^a-z0-9]/gi,'')}${fileHint}`;
          
          html += `
            <div class="download-item">
              <div class="quality-badge">
                <i class="fas fa-video"></i>
                <span>${escapeHtml(qualityText)} ${sizeStr ? `· ${sizeStr}` : ''}</span>
              </div>
              <button class="download-btn" data-url="${encodeURI(item.url)}" data-filename="${filename}">
                <i class="fas fa-download"></i> Save
              </button>
            </div>
          `;
        });

        // Audio items
        audioItems.forEach((item) => {
          const sizeStr = item.data_size ? formatBytes(item.data_size) : '';
          const qualityAudio = item.quality || 'audio';
          const ext = item.extension || 'mp3';
          const filename = `${title.replace(/[^a-z0-9]/gi,'_').substring(0,25) || 'audio'}_audio.${ext}`;
          
          html += `
            <div class="download-item audio-download">
              <div class="quality-badge">
                <i class="fas fa-music"></i>
                <span>🎵 Audio ${ext.toUpperCase()} ${sizeStr ? `· ${sizeStr}` : ''}</span>
              </div>
              <button class="download-btn" data-url="${encodeURI(item.url)}" data-filename="${filename}">
                <i class="fas fa-download"></i> MP3
              </button>
            </div>
          `;
        });

        html += `</div>`;
      }
      
      // Add time_end if present
      if (data.time_end) {
        html += `<div style="margin-top:12px; font-size:0.7rem; color:#6b7b90; text-align:right;"><i class="far fa-hourglass"></i> fetched in ${data.time_end}ms</div>`;
      }
      html += `</div>`; // close media-card

      resultContainer.innerHTML = html;

      // Attach event listeners to download buttons
      document.querySelectorAll('.download-btn[data-url]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          const url = decodeURIComponent(btn.dataset.url);
          const fname = btn.dataset.filename || 'download';
          downloadMedia(url, fname);
        });
      });
    }

    // Simple escape
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Main fetch function
    async function fetchMedia(videoUrl) {
      if (!videoUrl || !videoUrl.trim()) {
        setStatus('⛔ Please enter a video URL', true);
        return;
      }

      // basic url check
      if (!videoUrl.startsWith('http')) {
        setStatus('❌ Invalid URL. Include https://', true);
        return;
      }

      // Clear old results, show loader
      resultContainer.innerHTML = '';
      showLoader('Contacting RapidAPI...');
      fetchBtn.disabled = true;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-rapidapi-host': API_HOST,
            'x-rapidapi-key': RAPIDAPI_KEY
          },
          body: JSON.stringify({ url: videoUrl })
        });

        if (!response.ok) {
          let errorDetail = `HTTP ${response.status}`;
          try {
            const errJson = await response.json();
            errorDetail = errJson.message || JSON.stringify(errJson);
          } catch (e) {}
          throw new Error(`API error (${response.status}): ${errorDetail}`);
        }

        const data = await response.json();
        console.log('API response:', data);
        
        if (data && data.error === false) {
          clearStatus();
          renderResult(data);
        } else {
          const msg = data?.message || 'Could not retrieve media. Unsupported or private?';
          setStatus(`⚠️ ${msg}`, true);
          resultContainer.innerHTML = `<div class="error-note"><i class="fas fa-info-circle"></i> ${escapeHtml(msg)}</div>`;
        }
      } catch (err) {
        console.error(err);
        setStatus(`🚫 ${err.message}`, true);
        resultContainer.innerHTML = `<div class="error-note"><i class="fas fa-plug"></i> Request failed. Check key/network.<br><small>${escapeHtml(err.message)}</small></div>`;
      } finally {
        fetchBtn.disabled = false;
      }
    }

    // Event listeners
    fetchBtn.addEventListener('click', (e) => {
      e.preventDefault();
      const url = urlInput.value.trim();
      fetchMedia(url);
    });

    // Enter key in input
    urlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        fetchBtn.click();
      }
    });

    // Example buttons (quick fill + auto fetch)
    document.querySelectorAll('.example-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const demoUrl = btn.getAttribute('data-url');
        if (demoUrl) {
          urlInput.value = demoUrl;
          fetchMedia(demoUrl);
        }
      });
    });

    // Optional: autofill with TikTok demo on page load? (just as placeholder)
    // But we can prefill the field for convenience
    window.addEventListener('load', () => {
      // Prefill with the TikTok example from API documentation (optional)
      if (!urlInput.value) {
        urlInput.value = 'https://www.tiktok.com/@yeuphimzz/video/7237370304337628442';
      }
    });

  })();
</script>
</body>
</html>
